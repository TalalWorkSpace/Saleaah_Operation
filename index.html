<!DOCTYPE html>
<html dir="rtl" lang="ar">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>سلعة — لوحة العمليات</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --brand: #745ff2;
        --brand-light: #ece9fe;
        --brand-dark: #5a45d6;
        --ok: #22c55e;
        --err: #ef4444;
        --bg: #f8f7fc;
        --card: #ffffff;
        --text: #1e1e2e;
        --muted: #71717a;
        --radius: 14px;
        --shadow: 0 2px 12px rgba(116, 95, 242, 0.08);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Cairo', sans-serif;
        font-weight: 400;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        direction: rtl;
        line-height: 1.6;
        position: relative;
      }
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image: url('PATTERN_URL_HERE');
        background-size: 180px;
        opacity: 0.08;
        pointer-events: none;
        z-index: 0;
      }
      .wrapper {
        position: relative;
        z-index: 1;
        max-width: 900px;
        margin: 0 auto;
        padding: 24px 18px 60px;
        animation: fadeIn 0.5s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .header {
        text-align: center;
        margin-bottom: 28px;
      }
      .header img {
        width: 80px;
        height: 80px;
        border-radius: 20px;
        object-fit: contain;
        margin-bottom: 8px;
      }
      .header h1 {
        font-size: 28px;
        font-weight: 700;
        color: var(--brand);
      }
      .header p {
        font-size: 14px;
        color: var(--muted);
      }
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(
          auto-fit,
          minmax(160px, 1fr)
        );
        gap: 14px;
        margin-bottom: 24px;
      }
      .stat-card {
        background: var(--card);
        border-radius: var(--radius);
        padding: 18px 16px;
        box-shadow: var(--shadow);
        text-align: center;
        border-top: 3px solid var(--brand);
      }
      .stat-card .num {
        font-size: 30px;
        font-weight: 700;
        color: var(--brand);
        line-height: 1.1;
      }
      .stat-card .lbl {
        font-size: 12px;
        color: var(--muted);
        margin-top: 4px;
        font-weight: 600;
      }
      .stat-card.time-card {
        border-top-color: var(--muted);
      }
      .stat-card.time-card .num {
        font-size: 16px;
        color: var(--text);
      }
      .section {
        background: var(--card);
        border-radius: var(--radius);
        padding: 20px;
        box-shadow: var(--shadow);
        margin-bottom: 20px;
      }
      .section-title {
        font-size: 16px;
        font-weight: 700;
        color: var(--brand);
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .section-title span {
        font-size: 20px;
      }
      .dist-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
        margin-top: 8px;
      }
      .dist-table th {
        background: var(--brand);
        color: #fff;
        font-weight: 600;
        padding: 10px 8px;
        text-align: center;
      }
      .dist-table th:first-child {
        border-radius: 0 8px 0 0;
      }
      .dist-table th:last-child {
        border-radius: 8px 0 0 0;
      }
      .dist-table td {
        padding: 9px 8px;
        text-align: center;
        border-bottom: 1px solid #f0eef8;
      }
      .dist-table tr:hover td {
        background: var(--brand-light);
      }
      .btn-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 12px 10px;
        border: none;
        border-radius: 10px;
        font-family: 'Cairo', sans-serif;
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s ease;
        background: var(--brand);
        color: #fff;
      }
      .btn:hover {
        background: var(--brand-dark);
        transform: translateY(-1px);
      }
      .btn:active {
        transform: scale(0.97);
      }
      .btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
        transform: none;
      }
      .btn.outline {
        background: transparent;
        color: var(--brand);
        border: 2px solid var(--brand);
      }
      .btn.outline:hover {
        background: var(--brand-light);
      }
      .btn.danger {
        background: var(--err);
      }
      .btn.danger:hover {
        background: #dc2626;
      }
      .btn.full {
        grid-column: 1 / -1;
      }
      .trigger-list {
        margin-top: 12px;
        font-size: 12px;
        background: #f9f9fb;
        border-radius: 8px;
        padding: 10px 12px;
        max-height: 150px;
        overflow-y: auto;
        display: none;
      }
      .trigger-list.show {
        display: block;
      }
      .trigger-item {
        padding: 4px 0;
        border-bottom: 1px solid #eee;
        display: flex;
        justify-content: space-between;
      }
      .trigger-item:last-child {
        border-bottom: none;
      }
      .logs-wrapper {
        max-height: 320px;
        overflow-y: auto;
        margin-top: 8px;
      }
      .log-row {
        display: grid;
        grid-template-columns: 26px 1fr auto;
        gap: 8px;
        align-items: start;
        padding: 8px 4px;
        border-bottom: 1px solid #f0eef8;
        font-size: 12px;
      }
      .log-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        margin-top: 5px;
        justify-self: center;
      }
      .log-dot.ok {
        background: var(--ok);
      }
      .log-dot.err {
        background: var(--err);
      }
      .log-info strong {
        font-weight: 600;
      }
      .log-info .details {
        color: var(--muted);
        display: block;
        word-break: break-word;
      }
      .log-meta {
        text-align: left;
        color: var(--muted);
        white-space: nowrap;
        font-size: 11px;
      }
      .logs-actions {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }
      .logs-actions .btn {
        font-size: 12px;
        padding: 8px 16px;
      }
      .overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(255, 255, 255, 0.7);
        z-index: 999;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 14px;
      }
      .overlay.show {
        display: flex;
      }
      .spinner {
        width: 46px;
        height: 46px;
        border: 4px solid var(--brand-light);
        border-top-color: var(--brand);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .overlay-text {
        font-size: 14px;
        font-weight: 600;
        color: var(--brand);
      }
      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(80px);
        padding: 12px 28px;
        border-radius: 10px;
        color: #fff;
        font-family: 'Cairo', sans-serif;
        font-weight: 600;
        font-size: 14px;
        z-index: 1000;
        transition: transform 0.35s, opacity 0.35s;
        opacity: 0;
        pointer-events: none;
      }
      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }
      .toast.success {
        background: var(--ok);
      }
      .toast.error {
        background: var(--err);
      }
      @media (max-width: 500px) {
        .btn-grid {
          grid-template-columns: 1fr;
        }
        .stats-grid {
          grid-template-columns: 1fr 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="overlay" id="overlay">
      <div class="spinner"></div>
      <div class="overlay-text" id="overlayText">
        جارٍ التنفيذ...
      </div>
    </div>
    <div class="toast" id="toast"></div>

    <div class="wrapper">
      <div class="header">
        <img src="LOGO_URL_HERE" alt="سلعة" />
        <h1>سلعة</h1>
        <p>موردك الأول في الدواجن</p>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="num" id="statSent">--</div>
          <div class="lbl">Sent to Courier</div>
        </div>
        <div class="stat-card">
          <div class="num" id="statOrderId">--</div>
          <div class="lbl">لديها Order ID</div>
        </div>
        <div class="stat-card">
          <div class="num" id="statTotal">--</div>
          <div class="lbl">إجمالي الصفوف</div>
        </div>
        <div class="stat-card time-card">
          <div class="num" id="statTime">--</div>
          <div class="lbl">آخر تحديث</div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">
          <span>📊</span> نتائج التوزيع
        </div>
        <div id="distTableWrap">
          <p style="color: var(--muted); text-align: center; font-size: 13px">
            جارٍ تحميل الجدول...
          </p>
        </div>
      </div>

      <div class="section">
        <div class="section-title">
          <span>⚡</span> العمليات
        </div>
        <div class="btn-grid">
          <button class="btn" onclick="run('opFetchUpload','رفع طلبات Shipday')">
            📥 رفع طلبات Shipday (غدًا)
          </button>
          <button class="btn" onclick="run('opUpdateExisting','تحديث طلبات Shipday')">
            🔄 تحديث طلبات Shipday
          </button>
          <button class="btn" onclick="run('opDistributeSweep','توزيع Sweep')">
            🧹 توزيع Sweep
          </button>
          <button class="btn" onclick="run('opDistributeToMain','توزيع إلى Main')">
            📤 توزيع إلى Main
          </button>
          <button class="btn full" onclick="run('opFillMissingIds','تعبئة OrderIds')">
            🔑 تعبئة OrderIds الناقصة
          </button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">
          <span>⏰</span> التريقرات
        </div>
        <div class="btn-grid">
          <button class="btn outline" onclick="run('opSetupTrigger','إنشاء Trigger')">
            ➕ إنشاء Trigger / 5 د
          </button>
          <button class="btn danger" onclick="run('opDeleteTriggers','حذف Triggers')">
            🗑 حذف Triggers
          </button>
          <button class="btn outline full" onclick="loadTriggers()">
            👁 عرض التريقرات الحالية
          </button>
        </div>
        <div class="trigger-list" id="triggerList"></div>
      </div>

      <div class="section">
        <div class="section-title">
          <span>📋</span> سجل آخر العمليات
        </div>
        <div class="logs-wrapper" id="logsWrap">
          <p style="color: var(--muted); text-align: center; font-size: 13px">
            جارٍ التحميل...
          </p>
        </div>
        <div class="logs-actions">
          <button class="btn outline" onclick="loadLogs()">
            تحديث السجل
          </button>
          <button class="btn danger" onclick="doClearLogs()">
            مسح السجل
          </button>
        </div>
      </div>
    </div>

    <script>
      // ╔════════════════════════════════════════════╗
      // ║  ⬇️  ضع رابط السكربت هنا  ⬇️              ║
      // ╚════════════════════════════════════════════╝
      var API_URL =
        'https://script.google.com/a/macros/saleaah.com/s/AKfycbxXeUVmz9CMElbz9k4I98w-VrTrZXZJgI5ApwgBJQAvxyYKHB1A5YnKQuzAcLwGsjM/exec';
      // مثال:
      // 'https://script.google.com/macros/s/AKfycb.../exec'

      /* ── Helpers ── */
      function $(id) {
        return document.getElementById(id);
      }

      function showOverlay(msg) {
        $('overlayText').textContent =
          msg || 'جارٍ التنفيذ...';
        $('overlay').classList.add('show');
      }

      function hideOverlay() {
        $('overlay').classList.remove('show');
      }

      var _tt;
      function toast(msg, type) {
        var el = $('toast');
        el.textContent = msg;
        el.className = 'toast ' + (type || 'success');
        clearTimeout(_tt);
        requestAnimationFrame(function () {
          el.classList.add('show');
        });
        _tt = setTimeout(function () {
          el.classList.remove('show');
        }, 3500);
      }

      function disableButtons(v) {
        document
          .querySelectorAll('.btn')
          .forEach(function (b) {
            b.disabled = v;
          });
      }

      function esc(s) {
        if (s == null) return '';
        var d = document.createElement('div');
        d.appendChild(
          document.createTextNode(String(s))
        );
        return d.innerHTML;
      }

      /* ── API Calls ── */
      function apiGet(action, params) {
        var url = new URL(API_URL);
        url.searchParams.set('action', action);
        if (params) {
          Object.keys(params).forEach(function (k) {
            url.searchParams.set(k, params[k]);
          });
        }
        return fetch(url.toString(), {
          redirect: 'follow'
        }).then(function (r) {
          return r.json();
        });
      }

      function apiPost(action) {
        return fetch(API_URL, {
          method: 'POST',
          redirect: 'follow',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
          },
          body: JSON.stringify({ action: action })
        }).then(function (r) {
          return r.json();
        });
      }

      /* ── Run Operation (POST) ── */
      function run(fnName, label) {
        showOverlay(label + '...');
        disableButtons(true);
        apiPost(fnName)
          .then(function (r) {
            hideOverlay();
            disableButtons(false);
            if (r && r.ok) {
              toast(
                label + ' ✅ (' + r.duration + ' ث)',
                'success'
              );
            } else {
              toast(
                (r && r.message) || 'خطأ غير معروف',
                'error'
              );
            }
            loadStats();
            loadLogs();
            if (
              fnName === 'opDistributeSweep' ||
              fnName === 'opDistributeToMain'
            ) {
              loadDistTable();
            }
          })
          .catch(function (e) {
            hideOverlay();
            disableButtons(false);
            toast(
              e.message || 'خطأ في الاتصال',
              'error'
            );
          });
      }

      /* ── Load Stats ── */
      function loadStats() {
        apiGet('getStats').then(function (r) {
          if (r && r.ok) {
            $('statSent').textContent = r.sentToCourier;
            $('statOrderId').textContent = r.withOrderId;
            $('statTotal').textContent = r.totalRows;
            $('statTime').textContent = r.now;
          }
        });
      }

      /* ── Load Distribution Table ── */
      function loadDistTable() {
        apiGet('getDistributionTable')
          .then(function (r) {
            var w = $('distTableWrap');
            if (!r || !r.ok) {
              w.innerHTML =
                '<p style="color:var(--err);text-align:center;font-size:13px">' +
                esc((r && r.message) || 'خطأ') +
                '</p>';
              return;
            }
            if (
              !r.headers ||
              r.headers.length === 0
            ) {
              w.innerHTML =
                '<p style="color:var(--muted);text-align:center;font-size:13px">لا توجد بيانات</p>';
              return;
            }
            var h =
              '<table class="dist-table"><thead><tr>';
            r.headers.forEach(function (c) {
              h += '<th>' + esc(c) + '</th>';
            });
            h += '</tr></thead><tbody>';
            r.rows.forEach(function (row) {
              h += '<tr>';
              row.forEach(function (c) {
                h += '<td>' + esc(c) + '</td>';
              });
              h += '</tr>';
            });
            h += '</tbody></table>';
            w.innerHTML = h;
          })
          .catch(function () {
            $('distTableWrap').innerHTML =
              '<p style="color:var(--err);text-align:center;font-size:13px">خطأ في تحميل الجدول</p>';
          });
      }

      /* ── Load Logs ── */
      function loadLogs() {
        apiGet('getRecentLogs', { limit: 12 })
          .then(function (r) {
            var w = $('logsWrap');
            if (
              !r ||
              !r.ok ||
              !r.logs ||
              !r.logs.length
            ) {
              w.innerHTML =
                '<p style="color:var(--muted);text-align:center;font-size:13px">لا توجد سجلات بعد</p>';
              return;
            }
            var h = '';
            r.logs.forEach(function (lg) {
              var cls =
                lg.status === 'OK' ? 'ok' : 'err';
              h += '<div class="log-row">';
              h +=
                '<div class="log-dot ' +
                cls +
                '"></div>';
              h += '<div class="log-info">';
              h +=
                '<strong>' +
                esc(lg.task) +
                '</strong>';
              h +=
                '<span class="details">' +
                esc(lg.details) +
                '</span>';
              h += '</div>';
              h += '<div class="log-meta">';
              h += esc(lg.timestamp);
              h +=
                '<br>' +
                (lg.duration || '0') +
                ' ث';
              h += '</div></div>';
            });
            w.innerHTML = h;
          })
          .catch(function () {
            $('logsWrap').innerHTML =
              '<p style="color:var(--err);text-align:center">خطأ</p>';
          });
      }

      /* ── Load Triggers ── */
      function loadTriggers() {
        var list = $('triggerList');
        list.classList.add('show');
        list.innerHTML =
          '<p style="color:var(--muted);text-align:center">جارٍ...</p>';
        apiGet('opListTriggers').then(function (r) {
          if (
            !r ||
            !r.ok ||
            !r.triggers ||
            !r.triggers.length
          ) {
            list.innerHTML =
              '<div style="color:var(--muted);text-align:center;padding:8px">لا توجد تريقرات</div>';
            return;
          }
          var h = '';
          r.triggers.forEach(function (t) {
            h += '<div class="trigger-item">';
            h += '<span>' + esc(t.handler) + '</span>';
            h +=
              '<span style="color:var(--muted)">' +
              esc(t.type) +
              '</span>';
            h += '</div>';
          });
          list.innerHTML = h;
        });
      }

      /* ── Clear Logs ── */
      function doClearLogs() {
        if (
          !confirm('هل تريد مسح جميع السجلات؟')
        )
          return;
        showOverlay('مسح السجل...');
        apiPost('clearLogs')
          .then(function (r) {
            hideOverlay();
            if (r && r.ok) {
              toast('تم مسح السجل ✅', 'success');
              loadLogs();
            } else {
              toast(
                (r && r.message) || 'خطأ',
                'error'
              );
            }
          })
          .catch(function (e) {
            hideOverlay();
            toast(e.message, 'error');
          });
      }

      /* ── Init ── */
      loadStats();
      loadDistTable();
      loadLogs();
    </script>
  </body>
</html>
